services:
  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
    networks:
      - flowboard

  worker:
    build: ./worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./worker:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
    networks:
      - flowboard

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowboard}
      POSTGRES_DB: ${POSTGRES_DB:-flowboard}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - flowboard

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - flowboard

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - flowboard

volumes:
  pgdata:

networks:
  flowboard:
